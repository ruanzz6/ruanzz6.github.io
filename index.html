<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>哈哈</title>
    <style>
      :root {
        color-scheme: light;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        height: 100dvh;
        min-height: 100vh;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", Arial, "Noto Sans CJK SC", sans-serif;
        background: radial-gradient(1200px 800px at 20% 10%, #fff1f2 0%, #fce7f3 35%, #f1f5f9 100%);
      }

      .stage {
        position: fixed;
        inset: 0;
        padding: max(12px, var(--safe-top)) max(12px, var(--safe-right)) max(12px, var(--safe-bottom))
          max(12px, var(--safe-left));
        box-sizing: border-box;
      }

      .modal {
        position: fixed;
        z-index: 10;
        width: min(320px, calc(100vw - 48px));
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.55);
        box-shadow: 0 18px 60px rgba(2, 6, 23, 0.35);
        backdrop-filter: blur(10px);
        padding: 14px 14px 12px;
        user-select: none;
        max-height: calc(100dvh - 24px - var(--safe-top) - var(--safe-bottom));
        overflow: auto;
        overscroll-behavior: contain;
      }

      @media (max-width: 420px) {
        .modal {
          width: min(300px, calc(100vw - 56px));
          padding: 12px 12px 10px;
        }

        .content {
          font-size: 13px;
        }

        button {
          padding: 12px 12px;
        }
      }

      .head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-weight: 900;
        letter-spacing: 0.04em;
        color: #0f172a;
      }

      .badge {
        font-size: 12px;
        font-weight: 800;
        color: #9f1239;
        background: #ffe4e6;
        border: 1px solid rgba(251, 113, 133, 0.55);
        padding: 4px 8px;
        border-radius: 999px;
      }

      .content {
        margin-top: 10px;
        font-size: 14px;
        line-height: 1.5;
        color: #0b1220;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
      }

      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 850;
        transition: transform 120ms ease, filter 120ms ease;
        touch-action: manipulation;
        flex: 1;
      }

      button:active {
        transform: scale(0.98);
      }

      .btn-close {
        background: linear-gradient(135deg, #fb7185 0%, #e11d48 100%);
        color: #ffffff;
      }

      .btn-more {
        background: linear-gradient(135deg, #a78bfa 0%, #6366f1 100%);
        color: #ffffff;
      }

      .hint {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.35;
        color: #475569;
        min-height: 16px;
      }

      .shake {
        animation: shake 240ms ease-in-out;
      }

      @keyframes shake {
        0% {
          transform: translate3d(0, 0, 0) rotate(0deg);
        }
        25% {
          transform: translate3d(-2px, 1px, 0) rotate(-0.4deg);
        }
        50% {
          transform: translate3d(3px, -1px, 0) rotate(0.5deg);
        }
        75% {
          transform: translate3d(-1px, 2px, 0) rotate(-0.3deg);
        }
        100% {
          transform: translate3d(0, 0, 0) rotate(0deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="stage" id="stage">
      <div class="modal" id="template" role="dialog" aria-modal="true" aria-label="弹窗">
        <div class="head">
          <span data-title>想关掉我吗</span>
          <span class="badge" data-badge></span>
        </div>
        <div class="content" data-content></div>
        <div class="actions">
          <button class="btn-close" data-close type="button">关闭</button>
          <button class="btn-more" data-more type="button">再来一个</button>
        </div>
        <div class="hint" data-hint></div>
      </div>
    </div>

    <script>
      const stage = document.getElementById("stage");
      const template = document.getElementById("template");

      let z = 10;
      let unlocked = false;
      let titleTapCount = 0;
      let lastTitleTapAt = 0;
      let popHandler = null;
      let autoTimer = null;
      let choiceTimer = null;
      const autoIntervalMs = 650;
      const maxModals = 26;
      let modalList = [];

      function clamp(n, min, max) {
        return Math.min(Math.max(n, min), max);
      }

      function readPxVar(name) {
        const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        const n = Number.parseFloat(v);
        return Number.isFinite(n) ? n : 0;
      }

      function getViewportSize() {
        if (window.visualViewport) {
          return { width: window.visualViewport.width, height: window.visualViewport.height };
        }
        return { width: window.innerWidth, height: window.innerHeight };
      }

      function placeRandom(modalEl) {
        modalEl.style.visibility = "hidden";
        modalEl.style.left = "12px";
        modalEl.style.top = "12px";

        requestAnimationFrame(() => {
          const rect = modalEl.getBoundingClientRect();
          const pad = 12;
          const safeLeft = readPxVar("--safe-left");
          const safeRight = readPxVar("--safe-right");
          const safeTop = readPxVar("--safe-top");
          const safeBottom = readPxVar("--safe-bottom");
          const { width: vw, height: vh } = getViewportSize();
          const minLeft = pad + safeLeft;
          const minTop = pad + safeTop;
          const maxLeft = Math.max(minLeft, vw - rect.width - pad - safeRight);
          const maxTop = Math.max(minTop, vh - rect.height - pad - safeBottom);
          const left = clamp(minLeft + Math.random() * (maxLeft - minLeft), minLeft, maxLeft);
          const top = clamp(minTop + Math.random() * (maxTop - minTop), minTop, maxTop);
          modalEl.style.left = `${Math.round(left)}px`;
          modalEl.style.top = `${Math.round(top)}px`;
          modalEl.style.visibility = "visible";
        });
      }

      function getParts(modalEl) {
        return {
          title: modalEl.querySelector("[data-title]"),
          badge: modalEl.querySelector("[data-badge]"),
          content: modalEl.querySelector("[data-content]"),
          hint: modalEl.querySelector("[data-hint]"),
          btnClose: modalEl.querySelector("[data-close]"),
          btnMore: modalEl.querySelector("[data-more]")
        };
      }

      function applyText(modalEl) {
        const { badge, content, hint, btnClose } = getParts(modalEl);
        if (unlocked) {
          badge.textContent = "已解锁";
          content.textContent = "已解除限制：可以正常返回/关闭页面。";
          hint.textContent = "点关闭会消失，不会再拦截返回。";
          btnClose.textContent = "关闭";
          return;
        }
        badge.textContent = "关不掉";
        content.textContent = "想关掉我吗？";
        hint.textContent = "点击关闭试试。";
        btnClose.textContent = "关闭";
      }

      function unlockExit() {
        if (unlocked) return;
        unlocked = true;
        if (popHandler) window.removeEventListener("popstate", popHandler);
        popHandler = null;
        if (autoTimer) clearInterval(autoTimer);
        if (choiceTimer) clearTimeout(choiceTimer);
        autoTimer = null;
        choiceTimer = null;
        const modals = stage.querySelectorAll(".modal");
        for (const m of modals) applyText(m);
        try {
          history.back();
        } catch (_) {}
      }

      function onTitleTap() {
        const now = Date.now();
        if (now - lastTitleTapAt > 1200) titleTapCount = 0;
        lastTitleTapAt = now;
        titleTapCount += 1;
        if (titleTapCount >= 8) unlockExit();
      }

      function pruneModals() {
        modalList = modalList.filter((m) => m && m.isConnected);
        while (modalList.length > maxModals) {
          const old = modalList.shift();
          if (old && old.isConnected) old.remove();
        }
      }

      function spawnModal(withShake, mode) {
        const modalEl = template.cloneNode(true);
        modalEl.removeAttribute("id");
        z += 1;
        modalEl.style.zIndex = `${z}`;
        stage.appendChild(modalEl);
        modalList.push(modalEl);
        pruneModals();
        applyText(modalEl);
        placeRandom(modalEl);
        if (mode === "choice") {
          attachChoice(modalEl);
        } else {
          attach(modalEl);
        }
        if (withShake) {
          modalEl.classList.remove("shake");
          void modalEl.offsetWidth;
          modalEl.classList.add("shake");
        }
        return modalEl;
      }

      function showChoiceModal() {
        const modalEl = spawnModal(true, "choice");
        const { title, badge, content, hint, btnClose, btnMore } = getParts(modalEl);
        if (title) title.textContent = "十秒到了";
        badge.textContent = "要关吗";
        content.textContent = "要关闭我吗？";
        hint.textContent = "选吧。";
        btnClose.textContent = "关闭";
        btnMore.textContent = "不关闭";
      }

      function attachChoice(modalEl) {
        const { title, btnClose, btnMore, hint } = getParts(modalEl);

        function react(text) {
          if (unlocked) {
            modalEl.remove();
            return;
          }
          hint.textContent = text;
          modalEl.classList.remove("shake");
          void modalEl.offsetWidth;
          modalEl.classList.add("shake");
          spawnModal(true);
        }

        btnClose.addEventListener("click", () => {
          react("你选了关闭？关不掉的。");
        });

        btnMore.addEventListener("click", () => {
          react("你选不关闭？那更关不掉了。");
        });

        if (title) {
          title.addEventListener("click", () => {
            onTitleTap();
          });
        }
      }

      function attach(modalEl) {
        const { title, btnClose, btnMore, hint } = getParts(modalEl);

        btnMore.addEventListener("click", () => {
          if (unlocked) return;
          spawnModal(true);
        });

        btnClose.addEventListener("click", () => {
          if (unlocked) {
            modalEl.remove();
            return;
          }
          hint.textContent = "关不掉吧？再点一次试试。";
          void modalEl.offsetWidth;
          modalEl.classList.add("shake");
          spawnModal(true);
        });


        if (title) {
          title.addEventListener("click", () => {
            onTitleTap();
          });
        }
      }

      function lockBack() {
        history.pushState(null, "", location.href);
        popHandler = () => {
          if (unlocked) return;
          history.pushState(null, "", location.href);
          const m = spawnModal(true);
          const { hint } = getParts(m);
          hint.textContent = "想跑？又来一个。";
        };
        window.addEventListener("popstate", popHandler);
      }

      lockBack();
      applyText(template);
      placeRandom(template);
      attach(template);
      modalList = [template];
      autoTimer = setInterval(() => {
        if (unlocked) return;
        spawnModal(false);
      }, autoIntervalMs);
      choiceTimer = setTimeout(() => {
        if (unlocked) return;
        showChoiceModal();
      }, 10000);

      window.addEventListener("resize", () => {
        const top = stage.lastElementChild;
        if (top && top.classList.contains("modal")) placeRandom(top);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", () => {
          const top = stage.lastElementChild;
          if (top && top.classList.contains("modal")) placeRandom(top);
        });
        window.visualViewport.addEventListener("scroll", () => {
          const top = stage.lastElementChild;
          if (top && top.classList.contains("modal")) placeRandom(top);
        });
      }

      window.addEventListener(
        "keydown",
        (e) => {
          if (e.key === "Escape") {
            e.preventDefault();
            e.stopPropagation();
          }
        },
        true
      );
    </script>
  </body>
</html>
